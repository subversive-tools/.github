# Reusable workflow – stored in the subversive-tools/.github repository
# Path in that repo: .github/workflows/redmine-plugin-test.yml
#
# Each plugin calls this via:
#   uses: subversive-tools/.github/.github/workflows/redmine-plugin-test.yml@main

name: Redmine Plugin Test

on:
  workflow_call:
    inputs:
      plugin_name:
        description: "Directory name of the plugin (e.g. redmine_subskills)"
        type: string
        required: true
      matrix:
        description: |
          JSON array of {redmine, ruby} pairs to test.
          Default covers Redmine 5.1 and 6.0.
        type: string
        required: false
        default: >-
          [
            {"redmine": "5.1-stable", "ruby": "3.1"},
            {"redmine": "6.0-stable", "ruby": "3.2"}
          ]

jobs:
  test:
    name: "Redmine ${{ matrix.redmine }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: redmine_test
          POSTGRES_USER: redmine
          POSTGRES_PASSWORD: redmine
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      RAILS_ENV: test
      BUNDLE_WITH: postgresql

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin_src

      - name: Checkout Redmine ${{ matrix.redmine }}
        uses: actions/checkout@v4
        with:
          repository: redmine/redmine
          ref: ${{ matrix.redmine }}
          path: redmine

      - name: Move plugin into Redmine
        run: mv plugin_src redmine/plugins/${{ inputs.plugin_name }}

      - name: Setup Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          working-directory: redmine
          bundler-cache: true

      - name: Configure test database
        run: |
          cat > redmine/config/database.yml << 'EOF'
          test:
            adapter: postgresql
            host: localhost
            port: 5432
            database: redmine_test
            username: redmine
            password: redmine
            encoding: utf8
          EOF

      - name: Migrate Redmine & plugin
        working-directory: redmine
        run: |
          bundle exec rake db:migrate
          bundle exec rake redmine:plugins:migrate NAME=${{ inputs.plugin_name }}

      - name: Run plugin tests
        working-directory: redmine
        run: bundle exec rake test:plugins NAME=${{ inputs.plugin_name }}
